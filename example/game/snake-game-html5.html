<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f0f5;
    color: #333;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .score-panel {
    display: flex;
    justify-content: space-between;
    width: 400px;
    padding: 12px 20px;
    background: #e2e2ec;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
  }

  .score-panel .label { color: #888899; font-weight: 400; margin-right: 6px; }
  .score-panel .current { color: #333; }
  .score-panel .current .value { color: #e94560; font-size: 20px; }
  .score-panel .best .value { color: #d4a017; font-size: 20px; }

  canvas {
    border-radius: 12px;
    display: block;
    background: #4a7c9b;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  }

  .hint {
    color: #999aaa;
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="score-panel">
    <div class="current"><span class="label">Score</span><span class="value" id="score">0</span></div>
    <div class="best"><span class="label">Best</span><span class="value" id="highscore">0</span></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="hint">Arrow Keys / WASD to move</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;
const BASE_INTERVAL = 120;
const MIN_INTERVAL = 60;

let snake, direction, nextDirection, food, score, highScore, gameState, timer;

function init() {
  highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  highscoreEl.textContent = highScore;
  gameState = 'start';
  drawOverlay('Snake', 'Press Space or Enter to Start');
}

function resetGame() {
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX, y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY }
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = 0;
  spawnFood();
  gameState = 'playing';
  clearInterval(timer);
  timer = setInterval(tick, getInterval());
}

function getInterval() {
  return Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 2);
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const empty = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) empty.push({ x, y });
    }
  }
  food = empty[Math.floor(Math.random() * empty.length)];
}

function tick() {
  direction = { ...nextDirection };
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > highScore) {
      highScore = score;
      highscoreEl.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
    }
    spawnFood();
    clearInterval(timer);
    timer = setInterval(tick, getInterval());
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  clearInterval(timer);
  gameState = 'over';
  draw();
  drawOverlay('Game Over', `Score: ${score}  —  Press Space or Enter`);
}

function draw() {
  ctx.fillStyle = '#4a7c9b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Food
  const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
  const r = CELL / 2 * pulse;
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const g = Math.round(200 - t * 80);
    const b = Math.round(100 + t * 60);
    ctx.fillStyle = `rgb(80, ${g}, ${b})`;
    const pad = i === 0 ? 1 : 2;
    const size = CELL - pad * 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, size, size, 5);
    ctx.fill();
  });
}

function drawOverlay(title, subtitle) {
  if (gameState !== 'start') draw();

  ctx.fillStyle = 'rgba(40, 60, 80, 0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ffffff';
  ctx.font = '700 36px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);

  ctx.fillStyle = '#8888aa';
  ctx.font = '400 15px Inter, system-ui, sans-serif';
  ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 24);
}

document.addEventListener('keydown', e => {
  const key = e.key;

  if ((key === ' ' || key === 'Enter') && gameState !== 'playing') {
    e.preventDefault();
    resetGame();
    draw();
    return;
  }

  if (gameState !== 'playing') return;

  const map = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
    a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
    W: { x: 0, y: -1 }, S: { x: 0, y: 1 },
    A: { x: -1, y: 0 }, D: { x: 1, y: 0 }
  };

  const dir = map[key];
  if (!dir) return;

  e.preventDefault();
  // Prevent reversing into self
  if (dir.x + direction.x === 0 && dir.y + direction.y === 0) return;
  nextDirection = dir;
});

init();
</script>
</body>
</html>
