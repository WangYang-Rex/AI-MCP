<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>程序员健康指南海报</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* 海报容器: 比例 3:4 */
        .poster {
            width: 1080px;
            height: 1440px;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
            /* 如果在浏览器预览，可以缩小显示 */
            transform-origin: top center;
            /* zoom: 0.5; */
        }

        /* 上半部分: 主题图 (1080 x 720) */
        .top-section {
            width: 100%;
            height: 720px;
            overflow: hidden;
        }

        .top-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 下半部分: 文字区 (1080 x 720) */
        .bottom-section {
            width: 100%;
            height: 720px;
            background-color: #D0E8E0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px;
            text-align: center;
        }

        .title {
            color: #2B6B4B;
            font-size: 64px;
            line-height: 1.6;
            font-weight: 700;
        }

        .emoji {
            font-size: 1.2em;
            vertical-align: middle;
            margin: 0 8px;
        }

        .subtitle {
            margin-top: 40px;
            font-size: 24px;
            color: #2B6B4B;
            opacity: 0.6;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="top-section">
            <img src="desk.png" alt="Programmer Desk">
        </div>
        <div class="bottom-section">
            <div>
                <h1 class="title">以为只是亚健康？<br>其实身体在求救<span class="emoji">💡</span><br>程序员必看</h1>
                <p class="subtitle">Healthy Coding Lifestyle</p>
            </div>
        </div>
    </div>
</body>
</html>
